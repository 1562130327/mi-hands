metadata:
  name: 360看图
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: 360AlbumViewer.exe
  install_paths:
    - "C:\\Program Files (x86)\\360\\360AlbumViewer"
  window_title_pattern: "* - 360看图"
  class_name: "360AlbumViewer"

login:
  required: false

features:
  - name: 图片查看
    description: 查看图片

operations:
  open:
    description: 打开 360 看图
    steps:
      - action: click
        target: "桌面 360 看图图标"
      - action: wait_for_element
        target: "360 看图窗口"
        timeout: 10

  open_image:
    description: 打开图片
    steps:
      - action: hotkey
        keys: ["ctrl", "o"]
      - action: wait_for_element
        target: "文件选择对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

  zoom_in:
    description: 放大
    steps:
      - action: hotkey
        keys: ["ctrl", "="]

  zoom_out:
    description: 缩小
    steps:
      - action: hotkey
        keys: ["ctrl", "-"]

  rotate:
    description: 旋转
    steps:
      - action: hotkey
        keys: ["ctrl", "r"]

uia_tree:
  main_window:
    class_name: "360AlbumViewer"
    children:
      - name: "图片显示区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    image_area: [400, 300]
