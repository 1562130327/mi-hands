metadata:
  name: 清理Pro
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: 360CleanPro.exe
  install_paths:
    - "C:\\Program Files (x86)\\360\\360CleanPro"
  window_title_pattern: "清理Pro*"
  class_name: "360CleanPro"

login:
  required: false

features:
  - name: 系统清理
    description: 清理系统垃圾

operations:
  open:
    description: 打开清理 Pro
    steps:
      - action: click
        target: "桌面清理 Pro 图标"
      - action: wait_for_element
        target: "清理 Pro 窗口"
        timeout: 10

  clean:
    description: 清理系统
    steps:
      - action: click
        target: "一键清理按钮"
      - action: wait_for_element
        target: "清理完成"
        timeout: 60

uia_tree:
  main_window:
    class_name: "360CleanPro"
    children:
      - name: "一键清理按钮"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    clean_button: [400, 300]
