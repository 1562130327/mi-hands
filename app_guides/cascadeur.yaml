metadata:
  name: Cascadeur
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Cascadeur.exe
  install_paths:
    - "C:\\Program Files\\Cascadeur"
  window_title_pattern: "Cascadeur*"
  class_name: "CascadeurWindow"

login:
  required: false

features:
  - name: 3D 动画
    description: 制作 3D 动画

operations:
  open:
    description: 打开 Cascadeur
    steps:
      - action: click
        target: "桌面 Cascadeur 图标"
      - action: wait_for_element
        target: "Cascadeur 窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "CascadeurWindow"
    children:
      - name: "动画区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    animation_area: [400, 300]
