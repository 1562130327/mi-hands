metadata:
  name: Google Chrome
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: chrome.exe
  install_paths:
    - "C:\\Program Files\\Google\\Chrome\\Application"
    - "C:\\Program Files (x86)\\Google\\Chrome\\Application"
  window_title_pattern: "* - Google Chrome"
  class_name: "Chrome_WidgetWin_1"

login:
  required: true
  method: google_account
  steps:
    - action: wait_for_element
      target: "登录按钮"
      timeout: 10
    - action: click
      target: "登录按钮"
    - action: wait_for_element
      target: "Google 登录页面"
      timeout: 30
    - action: notify_user
      message: "请登录 Google 账号"
    - action: wait_for_element
      target: "Chrome 主页"
      timeout: 60

features:
  - name: 网页浏览
    description: 浏览网页
  - name: 搜索
    description: 搜索信息
  - name: 书签
    description: 管理书签

operations:
  open:
    description: 打开 Chrome
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "chrome"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "Chrome 窗口"
        timeout: 10

  open_url:
    description: 打开指定网址
    steps:
      - action: hotkey
        keys: ["ctrl", "l"]
      - action: type_text
        text: "{url}"
      - action: press_key
        key: enter
    variables:
      - name: url
        description: 网址
        type: string

  search:
    description: 搜索关键词
    steps:
      - action: hotkey
        keys: ["ctrl", "l"]
      - action: type_text
        text: "{keyword}"
      - action: press_key
        key: enter
    variables:
      - name: keyword
        description: 搜索关键词
        type: string

  new_tab:
    description: 打开新标签页
    steps:
      - action: hotkey
        keys: ["ctrl", "t"]

  close_tab:
    description: 关闭当前标签页
    steps:
      - action: hotkey
        keys: ["ctrl", "w"]

uia_tree:
  main_window:
    class_name: "Chrome_WidgetWin_1"
    children:
      - name: "地址栏"
        type: "EditControl"
        path: [0, 0, 0]
      - name: "标签页"
        type: "TabControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    address_bar: [400, 40]
    new_tab: [100, 10]
