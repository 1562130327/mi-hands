metadata:
  name: Clash Party
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Clash Party.exe
  install_paths:
    - "C:\\Program Files\\Clash Party"
  window_title_pattern: "Clash Party*"
  class_name: "Chrome_WidgetWin_1"

login:
  required: false

features:
  - name: 代理管理
    description: 管理代理规则
  - name: 节点选择
    description: 选择代理节点

operations:
  open:
    description: 打开 Clash Party
    steps:
      - action: click
        target: "桌面 Clash Party 图标"
      - action: wait_for_element
        target: "Clash Party 窗口"
        timeout: 10

  select_node:
    description: 选择代理节点
    steps:
      - action: click
        target: "节点列表"
      - action: click
        target: "{node_name}"
    variables:
      - name: node_name
        description: 节点名称
        type: string

  enable_proxy:
    description: 启用代理
    steps:
      - action: click
        target: "代理开关"

  disable_proxy:
    description: 禁用代理
    steps:
      - action: click
        target: "代理开关"

uia_tree:
  main_window:
    class_name: "Chrome_WidgetWin_1"
    children:
      - name: "节点列表"
        type: "ListControl"
        path: [0, 0]
      - name: "代理开关"
        type: "ButtonControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    node_list: [200, 200]
    proxy_switch: [100, 100]
