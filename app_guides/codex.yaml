metadata:
  name: Codex++
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: codex++.exe
  install_paths:
    - "C:\\Users\\User\\AppData\\Local\\Programs\\codex++"
  window_title_pattern: "Codex++*"
  class_name: "Chrome_WidgetWin_1"

login:
  required: false

features:
  - name: AI 编程
    description: AI 辅助编程

operations:
  open:
    description: 打开 Codex++
    steps:
      - action: click
        target: "桌面 Codex++ 图标"
      - action: wait_for_element
        target: "Codex++ 窗口"
        timeout: 10

  new_task:
    description: 新建任务
    steps:
      - action: hotkey
        keys: ["ctrl", "n"]

  send_message:
    description: 发送消息
    steps:
      - action: click
        target: "输入框"
      - action: type_text
        text: "{message}"
      - action: press_key
        key: enter
    variables:
      - name: message
        description: 消息内容
        type: string

uia_tree:
  main_window:
    class_name: "Chrome_WidgetWin_1"
    children:
      - name: "输入框"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    input_box: [400, 500]
