metadata:
  name: 控制面板
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: control.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "控制面板*"
  class_name: "CabinetWClass"

login:
  required: false

features:
  - name: 系统管理
    description: 管理系统设置

operations:
  open:
    description: 打开控制面板
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "control"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "控制面板窗口"
        timeout: 10

  open_programs:
    description: 打开程序和功能
    steps:
      - action: click
        target: "程序"

  open_network:
    description: 打开网络和共享中心
    steps:
      - action: click
        target: "网络和 Internet"

  open_system:
    description: 打开系统
    steps:
      - action: click
        target: "系统和安全"

uia_tree:
  main_window:
    class_name: "CabinetWClass"
    children:
      - name: "程序"
        type: "LinkControl"
        path: [0, 0]
      - name: "网络和 Internet"
        type: "LinkControl"
        path: [0, 1]
      - name: "系统和安全"
        type: "LinkControl"
        path: [0, 2]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    programs: [200, 200]
    network: [200, 250]
    system: [200, 300]
