metadata:
  name: 设备管理器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: devmgmt.msc
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "设备管理器*"
  class_name: "MMCMainFrame"

login:
  required: false

features:
  - name: 设备管理
    description: 管理硬件设备

operations:
  open:
    description: 打开设备管理器
    steps:
      - action: hotkey
        keys: ["win", "x"]
      - action: click
        target: "设备管理器"
      - action: wait_for_element
        target: "设备管理器窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "MMCMainFrame"
    children:
      - name: "设备列表"
        type: "TreeControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    device_list: [400, 300]
