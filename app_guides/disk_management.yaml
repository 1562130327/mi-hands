metadata:
  name: 磁盘管理
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: diskmgmt.msc
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "磁盘管理*"
  class_name: "MMCMainFrame"

login:
  required: false

features:
  - name: 磁盘管理
    description: 管理磁盘分区

operations:
  open:
    description: 打开磁盘管理
    steps:
      - action: hotkey
        keys: ["win", "x"]
      - action: click
        target: "磁盘管理"
      - action: wait_for_element
        target: "磁盘管理窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "MMCMainFrame"
    children:
      - name: "磁盘列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    disk_list: [400, 300]
