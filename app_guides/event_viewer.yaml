metadata:
  name: 事件查看器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: eventvwr.msc
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "事件查看器*"
  class_name: "MMCMainFrame"

login:
  required: false

features:
  - name: 事件查看
    description: 查看系统事件

operations:
  open:
    description: 打开事件查看器
    steps:
      - action: hotkey
        keys: ["win", "x"]
      - action: click
        target: "事件查看器"
      - action: wait_for_element
        target: "事件查看器窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "MMCMainFrame"
    children:
      - name: "事件列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    event_list: [400, 300]
