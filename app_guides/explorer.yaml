metadata:
  name: 文件管理器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: explorer.exe
  install_paths:
    - "C:\\Windows\\explorer.exe"
  window_title_pattern: "*"
  class_name: "CabinetWClass"

login:
  required: false

features:
  - name: 文件浏览
    description: 浏览文件和文件夹
  - name: 文件操作
    description: 复制、移动、删除文件
  - name: 文件搜索
    description: 搜索文件

operations:
  open:
    description: 打开文件管理器
    steps:
      - action: hotkey
        keys: ["win", "e"]
      - action: wait_for_element
        target: "文件管理器窗口"
        timeout: 10

  open_folder:
    description: 打开文件夹
    steps:
      - action: type_text
        text: "{folder_path}"
      - action: press_key
        key: enter
    variables:
      - name: folder_path
        description: 文件夹路径
        type: string

  new_folder:
    description: 新建文件夹
    steps:
      - action: hotkey
        keys: ["ctrl", "shift", "n"]
      - action: type_text
        text: "{folder_name}"
      - action: press_key
        key: enter
    variables:
      - name: folder_name
        description: 文件夹名称
        type: string

  rename:
    description: 重命名文件
    steps:
      - action: press_key
        key: "f2"
      - action: type_text
        text: "{new_name}"
      - action: press_key
        key: enter
    variables:
      - name: new_name
        description: 新名称
        type: string

  delete:
    description: 删除文件
    steps:
      - action: press_key
        key: "delete"
      - action: wait_for_element
        target: "确认对话框"
      - action: press_key
        key: enter

  copy:
    description: 复制文件
    steps:
      - action: hotkey
        keys: ["ctrl", "c"]

  paste:
    description: 粘贴文件
    steps:
      - action: hotkey
        keys: ["ctrl", "v"]

  search:
    description: 搜索文件
    steps:
      - action: hotkey
        keys: ["ctrl", "f"]
      - action: type_text
        text: "{keyword}"
    variables:
      - name: keyword
        description: 搜索关键词
        type: string

uia_tree:
  main_window:
    class_name: "CabinetWClass"
    children:
      - name: "地址栏"
        type: "EditControl"
        path: [0, 0, 0]
      - name: "文件列表"
        type: "ListControl"
        path: [0, 1, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    address_bar: [400, 40]
    file_list: [400, 300]
