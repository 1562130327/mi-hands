metadata:
  name: Gigabyte
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Gigabyte.exe
  install_paths:
    - "C:\\Program Files (x86)\\Gigabyte"
  window_title_pattern: "Gigabyte*"
  class_name: "GigabyteWindow"

login:
  required: false

features:
  - name: 硬件监控
    description: 监控硬件状态

operations:
  open:
    description: 打开 Gigabyte
    steps:
      - action: click
        target: "桌面 Gigabyte 图标"
      - action: wait_for_element
        target: "Gigabyte 窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "GigabyteWindow"
    children:
      - name: "监控区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    monitor_area: [400, 300]
