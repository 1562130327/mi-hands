metadata:
  name: ImageMagick
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: magick.exe
  install_paths:
    - "C:\\Program Files\\ImageMagick"
  window_title_pattern: "ImageMagick*"
  class_name: "ImageMagickWindow"

login:
  required: false

features:
  - name: 图像处理
    description: 处理图像

operations:
  open:
    description: 打开 ImageMagick
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10

  convert_image:
    description: 转换图像格式
    steps:
      - action: type_text
        text: "magick {input_file} {output_file}"
      - action: press_key
        key: enter
    variables:
      - name: input_file
        description: 输入文件
        type: string
      - name: output_file
        description: 输出文件
        type: string

uia_tree:
  main_window:
    class_name: "ImageMagickWindow"
    children:
      - name: "命令行"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    command_line: [400, 300]
