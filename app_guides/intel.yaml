metadata:
  name: Intel
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Intel.exe
  install_paths:
    - "C:\\Program Files\\Intel"
  window_title_pattern: "Intel*"
  class_name: "IntelWindow"

login:
  required: false

features:
  - name: 硬件管理
    description: 管理 Intel 硬件

operations:
  open:
    description: 打开 Intel
    steps:
      - action: click
        target: "桌面 Intel 图标"
      - action: wait_for_element
        target: "Intel 窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "IntelWindow"
    children:
      - name: "管理区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    manage_area: [400, 300]
