metadata:
  name: iVCam
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: iVCam.exe
  install_paths:
    - "C:\\Program Files\\LLe2eSoft\\iVCam"
  window_title_pattern: "iVCam*"
  class_name: "iVCamWindow"

login:
  required: false

features:
  - name: 摄像头
    description: 使用手机作为摄像头

operations:
  open:
    description: 打开 iVCam
    steps:
      - action: click
        target: "桌面 iVCam 图标"
      - action: wait_for_element
        target: "iVCam 窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "iVCamWindow"
    children:
      - name: "视频区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    video_area: [400, 300]
