metadata:
  name: JetBrains
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: jetbrains.exe
  install_paths:
    - "C:\\Program Files\\JetBrains"
  window_title_pattern: "JetBrains*"
  class_name: "JetBrainsWindow"

login:
  required: false

features:
  - name: IDE
    description: 集成开发环境

operations:
  open:
    description: 打开 JetBrains
    steps:
      - action: click
        target: "桌面 JetBrains 图标"
      - action: wait_for_element
        target: "JetBrains 窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "JetBrainsWindow"
    children:
      - name: "编辑区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    editor_area: [400, 300]
