metadata:
  name: 金山
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Kingsoft.exe
  install_paths:
    - "C:\\Program Files (x86)\\Kingsoft"
  window_title_pattern: "金山*"
  class_name: "KingsoftWindow"

login:
  required: false

features:
  - name: 办公软件
    description: 办公软件套件

operations:
  open:
    description: 打开金山
    steps:
      - action: click
        target: "桌面金山图标"
      - action: wait_for_element
        target: "金山窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "KingsoftWindow"
    children:
      - name: "办公区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    office_area: [400, 300]
