metadata:
  name: Krita
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: krita.exe
  install_paths:
    - "C:\\Program Files\\Krita (x64)"
  window_title_pattern: "* - Krita"
  class_name: "Krita"

login:
  required: false

features:
  - name: 绘画
    description: 数字绘画
  - name: 图像编辑
    description: 编辑图像

operations:
  open:
    description: 打开 Krita
    steps:
      - action: click
        target: "桌面 Krita 图标"
      - action: wait_for_element
        target: "Krita 窗口"
        timeout: 10

  new_image:
    description: 新建图像
    steps:
      - action: hotkey
        keys: ["ctrl", "n"]
      - action: wait_for_element
        target: "新建对话框"
      - action: click
        target: "确定按钮"

  open_image:
    description: 打开图像
    steps:
      - action: hotkey
        keys: ["ctrl", "o"]
      - action: wait_for_element
        target: "文件选择对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

  save_image:
    description: 保存图像
    steps:
      - action: hotkey
        keys: ["ctrl", "s"]

  export_image:
    description: 导出图像
    steps:
      - action: hotkey
        keys: ["ctrl", "shift", "e"]
      - action: wait_for_element
        target: "导出对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

uia_tree:
  main_window:
    class_name: "Krita"
    children:
      - name: "工具栏"
        type: "ToolBarControl"
        path: [0, 0]
      - name: "画布"
        type: "GroupControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    toolbar: [400, 30]
    canvas: [400, 300]
