metadata:
  name: 英雄联盟
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: LeagueClient.exe
  install_paths:
    - "C:\\Riot Games\\League of Legends"
  window_title_pattern: "League of Legends*"
  class_name: "RiotWindowClass"

login:
  required: true
  method: riot_account
  steps:
    - action: wait_for_element
      target: "登录界面"
      timeout: 10
    - action: type_text
      text: "{username}"
    - action: press_key
      key: "tab"
    - action: type_text
      text: "{password}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "游戏主界面"
      timeout: 30
    variables:
      - name: username
        description: Riot 用户名
        type: string
      - name: password
        description: Riot 密码
        type: string

features:
  - name: 游戏
    description: 玩游戏

operations:
  open:
    description: 打开英雄联盟
    steps:
      - action: click
        target: "桌面英雄联盟图标"
      - action: wait_for_element
        target: "英雄联盟窗口"
        timeout: 10

  start_game:
    description: 开始游戏
    steps:
      - action: click
        target: "开始游戏按钮"

uia_tree:
  main_window:
    class_name: "RiotWindowClass"
    children:
      - name: "开始游戏按钮"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    start_button: [400, 300]
