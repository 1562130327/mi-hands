metadata:
  name: Node.js
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: node.exe
  install_paths:
    - "C:\\Program Files\\nodejs"
  window_title_pattern: "* - Node.js"
  class_name: "ConsoleWindowClass"

login:
  required: false

features:
  - name: JavaScript 运行时
    description: 运行 JavaScript 代码
  - name: 包管理
    description: 管理 npm 包

operations:
  open:
    description: 打开 Node.js
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10

  run_script:
    description: 运行脚本
    steps:
      - action: type_text
        text: "node {script_path}"
      - action: press_key
        key: enter
    variables:
      - name: script_path
        description: 脚本路径
        type: string

  install_package:
    description: 安装包
    steps:
      - action: type_text
        text: "npm install {package_name}"
      - action: press_key
        key: enter
    variables:
      - name: package_name
        description: 包名称
        type: string

  run_npm_script:
    description: 运行 npm 脚本
    steps:
      - action: type_text
        text: "npm run {script_name}"
      - action: press_key
        key: enter
    variables:
      - name: script_name
        description: 脚本名称
        type: string

uia_tree:
  main_window:
    class_name: "ConsoleWindowClass"
    children:
      - name: "命令行"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    command_line: [400, 300]
