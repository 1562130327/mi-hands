metadata:
  name: OBS Studio
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: obs64.exe
  install_paths:
    - "C:\\Program Files\\obs-studio"
  window_title_pattern: "OBS Studio*"
  class_name: "OBSWindowClass"

login:
  required: false

features:
  - name: 直播推流
    description: 直播推流
  - name: 录制
    description: 录制视频

operations:
  open:
    description: 打开 OBS Studio
    steps:
      - action: click
        target: "桌面 OBS 图标"
      - action: wait_for_element
        target: "OBS 窗口"
        timeout: 10

  start_streaming:
    description: 开始直播
    steps:
      - action: click
        target: "开始推流按钮"

  stop_streaming:
    description: 停止直播
    steps:
      - action: click
        target: "停止推流按钮"

  start_recording:
    description: 开始录制
    steps:
      - action: click
        target: "开始录制按钮"

  stop_recording:
    description: 停止录制
    steps:
      - action: click
        target: "停止录制按钮"

uia_tree:
  main_window:
    class_name: "OBSWindowClass"
    children:
      - name: "开始推流按钮"
        type: "ButtonControl"
        path: [0, 0]
      - name: "开始录制按钮"
        type: "ButtonControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    start_streaming: [100, 100]
    start_recording: [200, 100]
