metadata:
  name: OneDrive
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: OneDrive.exe
  install_paths:
    - "C:\\Program Files\\Microsoft OneDrive"
  window_title_pattern: "OneDrive*"
  class_name: "OneDriveWindow"

login:
  required: true
  method: microsoft_account
  steps:
    - action: wait_for_element
      target: "登录界面"
      timeout: 10
    - action: type_text
      text: "{email}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "密码输入框"
      timeout: 10
    - action: type_text
      text: "{password}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "OneDrive 主界面"
      timeout: 30
    variables:
      - name: email
        description: Microsoft 邮箱
        type: string
      - name: password
        description: Microsoft 密码
        type: string

features:
  - name: 云存储
    description: 云存储文件

operations:
  open:
    description: 打开 OneDrive
    steps:
      - action: click
        target: "任务栏 OneDrive 图标"
      - action: wait_for_element
        target: "OneDrive 窗口"
        timeout: 10

  sync:
    description: 同步文件
    steps:
      - action: click
        target: "同步按钮"

uia_tree:
  main_window:
    class_name: "OneDriveWindow"
    children:
      - name: "同步按钮"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    sync_button: [100, 100]
