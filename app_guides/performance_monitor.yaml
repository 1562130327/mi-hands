metadata:
  name: 性能监视器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: perfmon.msc
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "性能监视器*"
  class_name: "MMCMainFrame"

login:
  required: false

features:
  - name: 性能监控
    description: 监控系统性能

operations:
  open:
    description: 打开性能监视器
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "perfmon.msc"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "性能监视器窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "MMCMainFrame"
    children:
      - name: "监视器"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    monitor: [400, 300]
