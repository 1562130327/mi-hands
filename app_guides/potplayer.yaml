metadata:
  name: PotPlayer
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: PotPlayerMini64.exe
  install_paths:
    - "C:\\Program Files\\DAUM\\PotPlayer"
  window_title_pattern: "* - PotPlayer"
  class_name: "PotPlayer"

login:
  required: false

features:
  - name: 视频播放
    description: 播放视频文件
  - name: 音频播放
    description: 播放音频文件

operations:
  open:
    description: 打开 PotPlayer
    steps:
      - action: click
        target: "桌面 PotPlayer 图标"
      - action: wait_for_element
        target: "PotPlayer 窗口"
        timeout: 10

  open_file:
    description: 打开媒体文件
    steps:
      - action: hotkey
        keys: ["ctrl", "o"]
      - action: wait_for_element
        target: "文件选择对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

  play:
    description: 播放
    steps:
      - action: press_key
        key: "space"

  pause:
    description: 暂停
    steps:
      - action: press_key
        key: "space"

  stop:
    description: 停止
    steps:
      - action: press_key
        key: "s"

  volume_up:
    description: 增加音量
    steps:
      - action: press_key
        key: "up"

  volume_down:
    description: 减少音量
    steps:
      - action: press_key
        key: "down"

  full_screen:
    description: 全屏
    steps:
      - action: press_key
        key: "enter"

uia_tree:
  main_window:
    class_name: "PotPlayer"
    children:
      - name: "播放区域"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    play_area: [400, 300]
