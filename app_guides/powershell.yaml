metadata:
  name: PowerShell
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: powershell.exe
  install_paths:
    - "C:\\Windows\\System32\\WindowsPowerShell\\v1.0"
  window_title_pattern: "PowerShell*"
  class_name: "ConsoleWindowClass"

login:
  required: false

features:
  - name: 命令行
    description: PowerShell 命令行

operations:
  open:
    description: 打开 PowerShell
    steps:
      - action: hotkey
        keys: ["win", "x"]
      - action: click
        target: "PowerShell"

  run_command:
    description: 运行命令
    steps:
      - action: type_text
        text: "{command}"
      - action: press_key
        key: enter
    variables:
      - name: command
        description: 命令
        type: string

uia_tree:
  main_window:
    class_name: "ConsoleWindowClass"
    children:
      - name: "命令行"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    command_line: [400, 300]
