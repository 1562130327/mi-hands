metadata:
  name: 资源监视器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: resmon.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "资源监视器*"
  class_name: "ResMonWindow"

login:
  required: false

features:
  - name: 资源监控
    description: 监控系统资源

operations:
  open:
    description: 打开资源监视器
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "resmon.exe"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "资源监视器窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "ResMonWindow"
    children:
      - name: "CPU"
        type: "TabControl"
        path: [0, 0]
      - name: "内存"
        type: "TabControl"
        path: [0, 1]
      - name: "磁盘"
        type: "TabControl"
        path: [0, 2]
      - name: "网络"
        type: "TabControl"
        path: [0, 3]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    cpu: [100, 100]
    memory: [200, 100]
    disk: [300, 100]
    network: [400, 100]
