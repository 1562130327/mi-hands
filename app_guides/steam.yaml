metadata:
  name: Steam
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: steam.exe
  install_paths:
    - "C:\\Program Files (x86)\\Steam"
  window_title_pattern: "Steam*"
  class_name: "vguiWindow"

login:
  required: true
  method: steam_account
  steps:
    - action: wait_for_element
      target: "登录界面"
      timeout: 10
    - action: type_text
      text: "{username}"
    - action: press_key
      key: "tab"
    - action: type_text
      text: "{password}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "Steam 主界面"
      timeout: 30
    variables:
      - name: username
        description: Steam 用户名
        type: string
      - name: password
        description: Steam 密码
        type: string

features:
  - name: 游戏库
    description: 管理游戏
  - name: 商店
    description: 购买游戏
  - name: 社区
    description: 游戏社区

operations:
  open:
    description: 打开 Steam
    steps:
      - action: click
        target: "桌面 Steam 图标"
      - action: wait_for_element
        target: "Steam 窗口"
        timeout: 10

  open_library:
    description: 打开游戏库
    steps:
      - action: click
        target: "库按钮"

  open_store:
    description: 打开商店
    steps:
      - action: click
        target: "商店按钮"

  launch_game:
    description: 启动游戏
    steps:
      - action: click
        target: "游戏库"
      - action: click
        target: "{game_name}"
      - action: click
        target: "播放按钮"
    variables:
      - name: game_name
        description: 游戏名称
        type: string

uia_tree:
  main_window:
    class_name: "vguiWindow"
    children:
      - name: "库按钮"
        type: "ButtonControl"
        path: [0, 0]
      - name: "商店按钮"
        type: "ButtonControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    library_button: [100, 30]
    store_button: [200, 30]
