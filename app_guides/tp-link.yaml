metadata:
  name: TP-LINK
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: TP-LINK.exe
  install_paths:
    - "C:\\Program Files (x86)\\TP-LINK"
  window_title_pattern: "TP-LINK*"
  class_name: "TPLINKWindow"

login:
  required: false

features:
  - name: 网络管理
    description: 管理网络设备

operations:
  open:
    description: 打开 TP-LINK
    steps:
      - action: click
        target: "桌面 TP-LINK 图标"
      - action: wait_for_element
        target: "TP-LINK 窗口"
        timeout: 10

uia_tree:
  main_window:
    class_name: "TPLINKWindow"
    children:
      - name: "网络设置"
        type: "GroupControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    network_settings: [400, 300]
