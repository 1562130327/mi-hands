metadata:
  name: Visual Studio
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: devenv.exe
  install_paths:
    - "C:\\Program Files\\Microsoft Visual Studio\\2026"
  window_title_pattern: "* - Visual Studio"
  class_name: "HwndWrapper[DefaultDomain;;]"

login:
  required: false

features:
  - name: IDE
    description: 集成开发环境

operations:
  open:
    description: 打开 Visual Studio
    steps:
      - action: click
        target: "桌面 Visual Studio 图标"
      - action: wait_for_element
        target: "Visual Studio 窗口"
        timeout: 10

  new_project:
    description: 新建项目
    steps:
      - action: hotkey
        keys: ["ctrl", "shift", "n"]
      - action: wait_for_element
        target: "新建项目对话框"

  open_project:
    description: 打开项目
    steps:
      - action: hotkey
        keys: ["ctrl", "o"]
      - action: wait_for_element
        target: "打开项目对话框"
      - action: type_text
        text: "{project_path}"
      - action: press_key
        key: enter
    variables:
      - name: project_path
        description: 项目路径
        type: string

  build:
    description: 生成项目
    steps:
      - action: hotkey
        keys: ["ctrl", "shift", "b"]

  run:
    description: 运行项目
    steps:
      - action: hotkey
        keys: ["f5"]

uia_tree:
  main_window:
    class_name: "HwndWrapper[DefaultDomain;;]"
    children:
      - name: "解决方案资源管理器"
        type: "GroupControl"
        path: [0, 0]
      - name: "代码编辑器"
        type: "GroupControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    solution_explorer: [50, 200]
    code_editor: [500, 300]
