metadata:
  name: Visual Studio Code
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Code.exe
  install_paths:
    - "C:\\Program Files\\Microsoft VS Code"
  window_title_pattern: "* - Visual Studio Code"
  class_name: "Chrome_WidgetWin_1"

login:
  required: false

features:
  - name: 代码编辑
    description: 编辑代码
  - name: 终端
    description: 内置终端
  - name: 调试
    description: 调试代码
  - name: 扩展
    description: 安装扩展

operations:
  open:
    description: 打开 VS Code
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "code"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "VS Code 窗口"
        timeout: 10

  open_folder:
    description: 打开文件夹
    steps:
      - action: hotkey
        keys: ["ctrl", "k", "ctrl", "o"]
      - action: wait_for_element
        target: "文件选择对话框"
      - action: type_text
        text: "{folder_path}"
      - action: press_key
        key: enter
    variables:
      - name: folder_path
        description: 文件夹路径
        type: string

  new_file:
    description: 新建文件
    steps:
      - action: hotkey
        keys: ["ctrl", "n"]

  save_file:
    description: 保存文件
    steps:
      - action: hotkey
        keys: ["ctrl", "s"]

  open_terminal:
    description: 打开终端
    steps:
      - action: hotkey
        keys: ["ctrl", "`"]

  run_code:
    description: 运行代码
    steps:
      - action: hotkey
        keys: ["ctrl", "shift", "p"]
      - action: type_text
        text: "Run Code"
      - action: press_key
        key: enter

uia_tree:
  main_window:
    class_name: "Chrome_WidgetWin_1"
    children:
      - name: "侧边栏"
        type: "GroupControl"
        path: [0, 0]
      - name: "编辑器"
        type: "GroupControl"
        path: [0, 1]
      - name: "终端"
        type: "GroupControl"
        path: [0, 2]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    sidebar: [50, 300]
    editor: [500, 300]
    terminal: [500, 600]
