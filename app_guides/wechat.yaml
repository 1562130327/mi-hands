metadata:
  name: 微信
  version: "3.9.10"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: WeChat.exe
  install_paths:
    - "C:\\Program Files\\Tencent\\WeChat"
    - "C:\\Program Files (x86)\\Tencent\\WeChat"
  window_title_pattern: "微信*"
  class_name: "WeChatMainWndForPC"

login:
  required: true
  method: qrcode
  steps:
    - action: wait_for_element
      target: "登录按钮"
      timeout: 10
    - action: click
      target: "登录按钮"
    - action: wait_for_element
      target: "二维码"
      timeout: 30
    - action: notify_user
      message: "请扫描二维码登录"
    - action: wait_for_element
      target: "聊天列表"
      timeout: 60

features:
  - name: 聊天
    description: 发送和接收消息
  - name: 通讯录
    description: 管理联系人
  - name: 文件传输
    description: 发送和接收文件

operations:
  open:
    description: 打开微信
    steps:
      - action: click
        target: "桌面微信图标"
      - action: wait_for_element
        target: "微信窗口"
        timeout: 10

  send_message:
    description: 发送消息给联系人
    steps:
      - action: click
        target: "搜索框"
      - action: type_text
        text: "{contact_name}"
      - action: wait_for_element
        target: "{contact_name}"
      - action: click
        target: "{contact_name}"
      - action: click
        target: "输入框"
      - action: type_text
        text: "{message}"
      - action: press_key
        key: enter
    variables:
      - name: contact_name
        description: 联系人名称
        type: string
      - name: message
        description: 消息内容
        type: string

  send_file:
    description: 发送文件给联系人
    steps:
      - action: click
        target: "搜索框"
      - action: type_text
        text: "{contact_name}"
      - action: wait_for_element
        target: "{contact_name}"
      - action: click
        target: "{contact_name}"
      - action: click
        target: "文件按钮"
      - action: wait_for_element
        target: "文件选择对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: contact_name
        description: 联系人名称
        type: string
      - name: file_path
        description: 文件路径
        type: string

uia_tree:
  main_window:
    class_name: "WeChatMainWndForPC"
    children:
      - name: "搜索框"
        type: "EditControl"
        path: [0, 1, 2]
      - name: "聊天列表"
        type: "ListControl"
        path: [0, 1, 3]
      - name: "输入框"
        type: "EditControl"
        path: [0, 2, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    search_box: [120, 40]
    chat_list: [120, 100]
    input_box: [400, 500]
