metadata:
  name: Windows 激活
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: slui.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "Windows 激活*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 系统激活
    description: 激活 Windows 系统

operations:
  open:
    description: 打开 Windows 激活
    steps:
      - action: hotkey
        keys: ["win", "i"]
      - action: click
        target: "更新和安全"
      - action: click
        target: "激活"
      - action: wait_for_element
        target: "Windows 激活窗口"
        timeout: 10

  activate:
    description: 激活 Windows
    steps:
      - action: click
        target: "更改产品密钥"
      - action: type_text
        text: "{product_key}"
      - action: click
        target: "下一步"
      - action: wait_for_element
        target: "激活成功"
        timeout: 60
    variables:
      - name: product_key
        description: 产品密钥
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "更改产品密钥"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    change_key: [200, 200]
