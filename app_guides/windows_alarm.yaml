metadata:
  name: Windows 闹钟
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Time.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "闹钟和时钟*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 闹钟
    description: 设置闹钟

operations:
  open:
    description: 打开闹钟
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "闹钟"
      - action: click
        target: "闹钟和时钟"
      - action: wait_for_element
        target: "闹钟窗口"
        timeout: 10

  set_alarm:
    description: 设置闹钟
    steps:
      - action: click
        target: "添加闹钟"
      - action: type_text
        text: "{time}"
      - action: type_text
        text: "{label}"
      - action: click
        target: "保存"
    variables:
      - name: time
        description: 闹钟时间
        type: string
      - name: label
        description: 闹钟标签
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "闹钟列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    alarm_list: [400, 300]
