metadata:
  name: Windows 启动所有
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootAll.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动所有*"
  class_name: "BootAll"

login:
  required: false

features:
  - name: 启动所有
    description: 查看所有启动项

operations:
  open:
    description: 打开启动所有
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /enum all"
      - action: press_key
        key: enter

uia_tree:
  main_window:
    class_name: "BootAll"
    children:
      - name: "所有启动项"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    all_boot: [400, 300]
