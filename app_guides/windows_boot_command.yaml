metadata:
  name: Windows 启动命令
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootCommand.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动命令*"
  class_name: "BootCommand"

login:
  required: false

features:
  - name: 启动命令
    description: 命令行启动

operations:
  open:
    description: 打开启动命令
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /set safeboot minimal"
      - action: press_key
        key: enter

uia_tree:
  main_window:
    class_name: "BootCommand"
    children:
      - name: "命令行"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    command_line: [400, 300]
