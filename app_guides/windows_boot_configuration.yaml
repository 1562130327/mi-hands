metadata:
  name: Windows 启动配置
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: msconfig.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "系统配置*"
  class_name: "MSCConfigWindow"

login:
  required: false

features:
  - name: 启动配置
    description: 配置启动选项

operations:
  open:
    description: 打开系统配置
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "msconfig"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "系统配置窗口"
        timeout: 10

  configure_boot:
    description: 配置启动
    steps:
      - action: click
        target: "引导"
      - action: click
        target: "{boot_option}"
      - action: click
        target: "确定"
    variables:
      - name: boot_option
        description: 启动选项
        type: string

uia_tree:
  main_window:
    class_name: "MSCConfigWindow"
    children:
      - name: "引导"
        type: "TabControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    boot_tab: [100, 50]
