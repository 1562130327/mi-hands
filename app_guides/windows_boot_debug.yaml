metadata:
  name: Windows 启动调试
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootDebug.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动调试*"
  class_name: "BootDebug"

login:
  required: false

features:
  - name: 启动调试
    description: 调试启动

operations:
  open:
    description: 打开启动调试
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /debug on"
      - action: press_key
        key: enter

uia_tree:
  main_window:
    class_name: "BootDebug"
    children:
      - name: "调试信息"
        type: "TextControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    debug_info: [400, 300]
