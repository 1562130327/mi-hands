metadata:
  name: Windows 启动默认
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootDefault.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动默认*"
  class_name: "BootDefault"

login:
  required: false

features:
  - name: 启动默认
    description: 设置默认启动项

operations:
  open:
    description: 打开启动默认
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /default {identifier}"
      - action: press_key
        key: enter
    variables:
      - name: identifier
        description: 启动项标识符
        type: string

uia_tree:
  main_window:
    class_name: "BootDefault"
    children:
      - name: "默认启动项"
        type: "TextControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    default: [400, 300]
