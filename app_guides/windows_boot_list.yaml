metadata:
  name: Windows 启动列表
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootList.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动列表*"
  class_name: "BootList"

login:
  required: false

features:
  - name: 启动列表
    description: 查看启动列表

operations:
  open:
    description: 打开启动列表
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /enum"
      - action: press_key
        key: enter

uia_tree:
  main_window:
    class_name: "BootList"
    children:
      - name: "启动列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    boot_list: [400, 300]
