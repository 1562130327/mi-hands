metadata:
  name: Windows 启动日志
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootLog.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动日志*"
  class_name: "BootLog"

login:
  required: false

features:
  - name: 启动日志
    description: 记录启动日志

operations:
  open:
    description: 打开启动日志
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /set bootlog yes"
      - action: press_key
        key: enter

uia_tree:
  main_window:
    class_name: "BootLog"
    children:
      - name: "日志"
        type: "TextControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    log: [400, 300]
