metadata:
  name: Windows 启动选项
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootOptions.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动选项*"
  class_name: "BootOptions"

login:
  required: false

features:
  - name: 启动选项
    description: 配置启动选项

operations:
  open:
    description: 打开启动选项
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "msconfig"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "系统配置窗口"
        timeout: 10
      - action: click
        target: "引导"

  configure:
    description: 配置启动选项
    steps:
      - action: click
        target: "{option}"
      - action: click
        target: "确定"
    variables:
      - name: option
        description: 启动选项
        type: string

uia_tree:
  main_window:
    class_name: "BootOptions"
    children:
      - name: "启动选项"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    options: [200, 200]
