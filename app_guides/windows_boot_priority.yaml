metadata:
  name: Windows 启动优先级
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootPriority.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动优先级*"
  class_name: "BootPriority"

login:
  required: false

features:
  - name: 启动优先级
    description: 设置启动优先级

operations:
  open:
    description: 打开启动优先级
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /enum"
      - action: press_key
        key: enter

  set_priority:
    description: 设置启动优先级
    steps:
      - action: type_text
        text: "bcdedit /set {identifier} device boot"
      - action: press_key
        key: enter
    variables:
      - name: identifier
        description: 启动项标识符
        type: string

uia_tree:
  main_window:
    class_name: "BootPriority"
    children:
      - name: "启动优先级列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    priority_list: [400, 300]
