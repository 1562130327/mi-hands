metadata:
  name: Windows 启动选择
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootSelection.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动选择*"
  class_name: "BootSelection"

login:
  required: false

features:
  - name: 启动选择
    description: 选择启动项

operations:
  open:
    description: 打开启动选择
    steps:
      - action: hotkey
        keys: ["win", "i"]
      - action: click
        target: "更新和安全"
      - action: click
        target: "恢复"
      - action: click
        target: "立即重新启动"
      - action: wait_for_element
        target: "高级启动选项"
        timeout: 60
      - action: click
        target: "疑难解答"
      - action: click
        target: "高级选项"
      - action: click
        target: "启动设置"
      - action: click
        target: "重启"

  select:
    description: 选择启动项
    steps:
      - action: press_key
        key: "{selection_number}"
    variables:
      - name: selection_number
        description: 选择编号
        type: string

uia_tree:
  main_window:
    class_name: "BootSelection"
    children:
      - name: "启动选择列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    selection_list: [400, 300]
