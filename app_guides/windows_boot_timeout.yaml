metadata:
  name: Windows 启动超时
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: bootTimeout.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "启动超时*"
  class_name: "BootTimeout"

login:
  required: false

features:
  - name: 启动超时
    description: 设置启动超时

operations:
  open:
    description: 打开启动超时
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10
      - action: type_text
        text: "bcdedit /timeout {timeout}"
      - action: press_key
        key: enter
    variables:
      - name: timeout
        description: 超时时间
        type: string

uia_tree:
  main_window:
    class_name: "BootTimeout"
    children:
      - name: "超时设置"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    timeout: [400, 300]
