metadata:
  name: Windows 计算器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Calculator.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "计算器*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 计算器
    description: 基本计算

operations:
  open:
    description: 打开计算器
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "计算器"
      - action: click
        target: "计算器"
      - action: wait_for_element
        target: "计算器窗口"
        timeout: 10

  calculate:
    description: 计算
    steps:
      - action: type_text
        text: "{expression}"
      - action: press_key
        key: enter
    variables:
      - name: expression
        description: 计算表达式
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "显示区域"
        type: "TextControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    display: [400, 100]
