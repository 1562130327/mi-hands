metadata:
  name: Windows Defender
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: MsMpEng.exe
  install_paths:
    - "C:\\Program Files\\Windows Defender"
  window_title_pattern: "Windows Defender*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 病毒防护
    description: Windows Defender 病毒防护

operations:
  open:
    description: 打开 Windows Defender
    steps:
      - action: hotkey
        keys: ["win", "i"]
      - action: click
        target: "更新和安全"
      - action: click
        target: "Windows 安全中心"
      - action: click
        target: "病毒和威胁防护"
      - action: wait_for_element
        target: "Windows Defender 窗口"
        timeout: 10

  scan:
    description: 扫描病毒
    steps:
      - action: click
        target: "快速扫描"
      - action: wait_for_element
        target: "扫描完成"
        timeout: 60

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "快速扫描"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    quick_scan: [200, 200]
