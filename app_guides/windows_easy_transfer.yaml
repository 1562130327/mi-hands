metadata:
  name: Windows 轻松传送
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: migwiz.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "Windows 轻松传送*"
  class_name: "EasyTransfer"

login:
  required: false

features:
  - name: 数据传送
    description: 传送数据到新电脑

operations:
  open:
    description: 打开轻松传送
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "migwiz.exe"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "轻松传送窗口"
        timeout: 10

  transfer:
    description: 传送数据
    steps:
      - action: click
        target: "下一步"
      - action: click
        target: "这是我的旧电脑"
      - action: click
        target: "下一步"
      - action: wait_for_element
        target: "传送完成"
        timeout: 1800

uia_tree:
  main_window:
    class_name: "EasyTransfer"
    children:
      - name: "下一步"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    next_button: [400, 400]
