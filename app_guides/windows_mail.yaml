metadata:
  name: Windows 邮件
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: HxOutlook.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "邮件*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: true
  method: microsoft_account
  steps:
    - action: wait_for_element
      target: "登录界面"
      timeout: 10
    - action: type_text
      text: "{email}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "密码输入框"
      timeout: 10
    - action: type_text
      text: "{password}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "邮件主界面"
      timeout: 30
    variables:
      - name: email
        description: Microsoft 邮箱
        type: string
      - name: password
        description: Microsoft 密码
        type: string

features:
  - name: 邮件
    description: 收发邮件

operations:
  open:
    description: 打开邮件
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "邮件"
      - action: click
        target: "邮件"
      - action: wait_for_element
        target: "邮件窗口"
        timeout: 10

  new_email:
    description: 新建邮件
    steps:
      - action: click
        target: "新建邮件"
      - action: type_text
        text: "{to}"
      - action: type_text
        text: "{subject}"
      - action: type_text
        text: "{body}"
      - action: click
        target: "发送"
    variables:
      - name: to
        description: 收件人
        type: string
      - name: subject
        description: 主题
        type: string
      - name: body
        description: 正文
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "邮件列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    email_list: [400, 300]
