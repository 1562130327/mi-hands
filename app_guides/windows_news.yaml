metadata:
  name: Windows 新闻
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Microsoft.News.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "新闻*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 新闻
    description: 查看新闻

operations:
  open:
    description: 打开新闻
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "新闻"
      - action: click
        target: "新闻"
      - action: wait_for_element
        target: "新闻窗口"
        timeout: 10

  search_news:
    description: 搜索新闻
    steps:
      - action: click
        target: "搜索框"
      - action: type_text
        text: "{keyword}"
      - action: press_key
        key: enter
    variables:
      - name: keyword
        description: 搜索关键词
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "搜索框"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    search_box: [400, 40]
