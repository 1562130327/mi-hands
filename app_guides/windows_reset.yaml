metadata:
  name: Windows 重置
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: systemreset.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "Windows 重置*"
  class_name: "ResetWindow"

login:
  required: false

features:
  - name: 系统重置
    description: 重置 Windows 系统

operations:
  open:
    description: 打开 Windows 重置
    steps:
      - action: hotkey
        keys: ["win", "i"]
      - action: click
        target: "更新和安全"
      - action: click
        target: "恢复"
      - action: click
        target: "开始"
      - action: wait_for_element
        target: "Windows 重置窗口"
        timeout: 10

  reset:
    description: 重置 Windows
    steps:
      - action: click
        target: "{reset_option}"
      - action: click
        target: "下一步"
      - action: click
        target: "重置"
      - action: wait_for_element
        target: "重置完成"
        timeout: 1800
    variables:
      - name: reset_option
        description: 重置选项
        type: string

uia_tree:
  main_window:
    class_name: "ResetWindow"
    children:
      - name: "保留我的文件"
        type: "ButtonControl"
        path: [0, 0]
      - name: "删除所有内容"
        type: "ButtonControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    keep_files: [200, 200]
    remove_everything: [200, 250]
