metadata:
  name: 系统还原
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: rstrui.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "系统还原*"
  class_name: "CabinetWClass"

login:
  required: false

features:
  - name: 系统还原
    description: 还原 Windows 系统

operations:
  open:
    description: 打开系统还原
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "rstrui.exe"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "系统还原窗口"
        timeout: 10

  restore:
    description: 还原系统
    steps:
      - action: click
        target: "下一步"
      - action: click
        target: "{restore_point}"
      - action: click
        target: "下一步"
      - action: click
        target: "完成"
    variables:
      - name: restore_point
        description: 还原点
        type: string

uia_tree:
  main_window:
    class_name: "CabinetWClass"
    children:
      - name: "下一步"
        type: "ButtonControl"
        path: [0, 0]
      - name: "还原点列表"
        type: "ListControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    next_button: [400, 400]
    restore_list: [400, 300]
