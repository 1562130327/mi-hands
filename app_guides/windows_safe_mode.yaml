metadata:
  name: Windows 安全模式
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: msconfig.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "系统配置*"
  class_name: "MSCConfigWindow"

login:
  required: false

features:
  - name: 安全模式
    description: 进入安全模式

operations:
  open:
    description: 打开系统配置
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "msconfig"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "系统配置窗口"
        timeout: 10

  enable_safe_mode:
    description: 启用安全模式
    steps:
      - action: click
        target: "引导"
      - action: click
        target: "安全引导"
      - action: click
        target: "确定"
      - action: click
        target: "重新启动"

  disable_safe_mode:
    description: 禁用安全模式
    steps:
      - action: click
        target: "引导"
      - action: click
        target: "安全引导"
      - action: click
        target: "确定"
      - action: click
        target: "重新启动"

uia_tree:
  main_window:
    class_name: "MSCConfigWindow"
    children:
      - name: "引导"
        type: "TabControl"
        path: [0, 0]
      - name: "安全引导"
        type: "CheckBoxControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    boot_tab: [100, 50]
    safe_boot: [200, 200]
