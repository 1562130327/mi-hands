metadata:
  name: Windows 设置
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: SystemSettings.exe
  install_paths:
    - "C:\\Windows\\ImmersiveControlPanel"
  window_title_pattern: "设置*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 系统设置
    description: Windows 系统设置

operations:
  open:
    description: 打开设置
    steps:
      - action: hotkey
        keys: ["win", "i"]
      - action: wait_for_element
        target: "设置窗口"
        timeout: 10

  open_network:
    description: 打开网络设置
    steps:
      - action: click
        target: "网络和 Internet"

  open_personalization:
    description: 打开个性化设置
    steps:
      - action: click
        target: "个性化"

  open_apps:
    description: 打开应用设置
    steps:
      - action: click
        target: "应用"

  open_accounts:
    description: 打开账户设置
    steps:
      - action: click
        target: "账户"

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "网络和 Internet"
        type: "ListItemControl"
        path: [0, 0]
      - name: "个性化"
        type: "ListItemControl"
        path: [0, 1]
      - name: "应用"
        type: "ListItemControl"
        path: [0, 2]
      - name: "账户"
        type: "ListItemControl"
        path: [0, 3]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    network: [100, 200]
    personalization: [100, 250]
    apps: [100, 300]
    accounts: [100, 350]
