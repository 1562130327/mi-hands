metadata:
  name: Windows 截图工具
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: SnippingTool.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "截图工具*"
  class_name: "Microsoft-Windows-SnippingTool"

login:
  required: false

features:
  - name: 截图工具
    description: 截取屏幕截图

operations:
  open:
    description: 打开截图工具
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "截图工具"
      - action: click
        target: "截图工具"
      - action: wait_for_element
        target: "截图工具窗口"
        timeout: 10

  take_screenshot:
    description: 截取屏幕截图
    steps:
      - action: click
        target: "新建"
      - action: drag
        from: "{start_x}, {start_y}"
        to: "{end_x}, {end_y}"
    variables:
      - name: start_x
        description: 起始 X 坐标
        type: integer
      - name: start_y
        description: 起始 Y 坐标
        type: integer
      - name: end_x
        description: 结束 X 坐标
        type: integer
      - name: end_y
        description: 结束 Y 坐标
        type: integer

  save_screenshot:
    description: 保存截图
    steps:
      - action: hotkey
        keys: ["ctrl", "s"]
      - action: wait_for_element
        target: "保存对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

uia_tree:
  main_window:
    class_name: "Microsoft-Windows-SnippingTool"
    children:
      - name: "新建按钮"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    new_button: [100, 100]
