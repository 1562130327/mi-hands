metadata:
  name: Windows SSH
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: ssh.exe
  install_paths:
    - "C:\\Windows\\System32\\OpenSSH"
  window_title_pattern: "SSH*"
  class_name: "ConsoleWindowClass"

login:
  required: false

features:
  - name: SSH 连接
    description: SSH 远程连接

operations:
  open:
    description: 打开 SSH
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "cmd"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "命令提示符"
        timeout: 10

  connect:
    description: 连接服务器
    steps:
      - action: type_text
        text: "ssh {username}@{host}"
      - action: press_key
        key: enter
    variables:
      - name: username
        description: 用户名
        type: string
      - name: host
        description: 主机地址
        type: string

uia_tree:
  main_window:
    class_name: "ConsoleWindowClass"
    children:
      - name: "命令行"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    command_line: [400, 300]
