metadata:
  name: Windows 步骤记录器
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: psr.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "步骤记录器*"
  class_name: "StepsRecorder"

login:
  required: false

features:
  - name: 步骤记录器
    description: 记录操作步骤

operations:
  open:
    description: 打开步骤记录器
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "psr.exe"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "步骤记录器窗口"
        timeout: 10

  start_recording:
    description: 开始记录
    steps:
      - action: click
        target: "开始记录"

  stop_recording:
    description: 停止记录
    steps:
      - action: click
        target: "停止记录"

  save_recording:
    description: 保存记录
    steps:
      - action: click
        target: "保存"
      - action: wait_for_element
        target: "保存对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

uia_tree:
  main_window:
    class_name: "StepsRecorder"
    children:
      - name: "开始记录按钮"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    start_button: [100, 100]
