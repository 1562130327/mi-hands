metadata:
  name: Windows 系统映像
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: sdclt.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "系统映像*"
  class_name: "CabinetWClass"

login:
  required: false

features:
  - name: 系统映像
    description: 创建和恢复系统映像

operations:
  open:
    description: 打开系统映像
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "sdclt.exe"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "备份和还原窗口"
        timeout: 10
      - action: click
        target: "创建系统映像"

  create_image:
    description: 创建系统映像
    steps:
      - action: click
        target: "在硬盘上"
      - action: click
        target: "{drive}"
      - action: click
        target: "下一步"
      - action: click
        target: "开始备份"
      - action: wait_for_element
        target: "备份完成"
        timeout: 1800
    variables:
      - name: drive
        description: 驱动器
        type: string

  restore_image:
    description: 恢复系统映像
    steps:
      - action: click
        target: "选择系统映像"
      - action: click
        target: "下一步"
      - action: click
        target: "{image_file}"
      - action: click
        target: "下一步"
      - action: click
        target: "完成"
      - action: wait_for_element
        target: "恢复完成"
        timeout: 1800
    variables:
      - name: image_file
        description: 映像文件
        type: string

uia_tree:
  main_window:
    class_name: "CabinetWClass"
    children:
      - name: "在硬盘上"
        type: "RadioButtonControl"
        path: [0, 0]
      - name: "开始备份"
        type: "ButtonControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    on_hard_drive: [100, 200]
    start_backup: [200, 300]
