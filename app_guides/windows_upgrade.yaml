metadata:
  name: Windows 升级
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Windows10Upgrade.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "Windows 升级*"
  class_name: "UpgradeWindow"

login:
  required: false

features:
  - name: 系统升级
    description: 升级 Windows 系统

operations:
  open:
    description: 打开 Windows 升级
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "Windows10Upgrade.exe"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "Windows 升级窗口"
        timeout: 10

  upgrade:
    description: 升级 Windows
    steps:
      - action: click
        target: "立即升级"
      - action: wait_for_element
        target: "升级完成"
        timeout: 1800

uia_tree:
  main_window:
    class_name: "UpgradeWindow"
    children:
      - name: "立即升级"
        type: "ButtonControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    upgrade_now: [400, 300]
