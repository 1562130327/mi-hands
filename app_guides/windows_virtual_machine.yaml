metadata:
  name: Windows 虚拟机
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: vmwp.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "Windows 虚拟机*"
  class_name: "VirtualMachineWindow"

login:
  required: false

features:
  - name: 虚拟机管理
    description: 管理虚拟机

operations:
  open:
    description: 打开 Windows 虚拟机
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "virtmgmt.msc"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "Windows 虚拟机窗口"
        timeout: 10

  create_vm:
    description: 创建虚拟机
    steps:
      - action: click
        target: "新建虚拟机"
      - action: click
        target: "下一步"
      - action: type_text
        text: "{vm_name}"
      - action: click
        target: "下一步"
      - action: click
        target: "下一步"
      - action: click
        target: "下一步"
      - action: click
        target: "完成"
    variables:
      - name: vm_name
        description: 虚拟机名称
        type: string

  start_vm:
    description: 启动虚拟机
    steps:
      - action: click
        target: "{vm_name}"
      - action: click
        target: "启动"
    variables:
      - name: vm_name
        description: 虚拟机名称
        type: string

  stop_vm:
    description: 停止虚拟机
    steps:
      - action: click
        target: "{vm_name}"
      - action: click
        target: "关闭"
    variables:
      - name: vm_name
        description: 虚拟机名称
        type: string

uia_tree:
  main_window:
    class_name: "VirtualMachineWindow"
    children:
      - name: "虚拟机列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    vm_list: [400, 300]
