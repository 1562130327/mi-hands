metadata:
  name: Windows 天气
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: Microsoft.Weather.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "天气*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: false

features:
  - name: 天气
    description: 查看天气预报

operations:
  open:
    description: 打开天气
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "天气"
      - action: click
        target: "天气"
      - action: wait_for_element
        target: "天气窗口"
        timeout: 10

  search_city:
    description: 搜索城市
    steps:
      - action: click
        target: "搜索框"
      - action: type_text
        text: "{city}"
      - action: press_key
        key: enter
    variables:
      - name: city
        description: 城市名称
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "搜索框"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    search_box: [400, 40]
