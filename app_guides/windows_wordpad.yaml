metadata:
  name: Windows 写字板
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: wordpad.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "写字板*"
  class_name: "WordPadClass"

login:
  required: false

features:
  - name: 写字板
    description: 富文本编辑

operations:
  open:
    description: 打开写字板
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "写字板"
      - action: click
        target: "写字板"
      - action: wait_for_element
        target: "写字板窗口"
        timeout: 10

  type_text:
    description: 输入文本
    steps:
      - action: type_text
        text: "{text}"
    variables:
      - name: text
        description: 文本内容
        type: string

  save_file:
    description: 保存文件
    steps:
      - action: hotkey
        keys: ["ctrl", "s"]
      - action: wait_for_element
        target: "保存对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

uia_tree:
  main_window:
    class_name: "WordPadClass"
    children:
      - name: "工具栏"
        type: "ToolBarControl"
        path: [0, 0]
      - name: "编辑区域"
        type: "EditControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    toolbar: [400, 30]
    editor: [400, 300]
