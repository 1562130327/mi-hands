metadata:
  name: Windows WSL
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: wsl.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "WSL*"
  class_name: "ConsoleWindowClass"

login:
  required: false

features:
  - name: Linux 子系统
    description: Windows Linux 子系统

operations:
  open:
    description: 打开 WSL
    steps:
      - action: hotkey
        keys: ["win", "r"]
      - action: type_text
        text: "wsl"
      - action: press_key
        key: "enter"
      - action: wait_for_element
        target: "WSL 窗口"
        timeout: 10

  run_command:
    description: 运行命令
    steps:
      - action: type_text
        text: "{command}"
      - action: press_key
        key: enter
    variables:
      - name: command
        description: Linux 命令
        type: string

uia_tree:
  main_window:
    class_name: "ConsoleWindowClass"
    children:
      - name: "命令行"
        type: "EditControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    command_line: [400, 300]
