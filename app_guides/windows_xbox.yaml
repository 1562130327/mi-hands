metadata:
  name: Xbox
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: XboxApp.exe
  install_paths:
    - "C:\\Windows\\System32"
  window_title_pattern: "Xbox*"
  class_name: "Windows.UI.Core.CoreWindow"

login:
  required: true
  method: microsoft_account
  steps:
    - action: wait_for_element
      target: "登录界面"
      timeout: 10
    - action: type_text
      text: "{email}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "密码输入框"
      timeout: 10
    - action: type_text
      text: "{password}"
    - action: press_key
      key: enter
    - action: wait_for_element
      target: "Xbox 主界面"
      timeout: 30
    variables:
      - name: email
        description: Microsoft 邮箱
        type: string
      - name: password
        description: Microsoft 密码
        type: string

features:
  - name: 游戏
    description: Xbox 游戏

operations:
  open:
    description: 打开 Xbox
    steps:
      - action: hotkey
        keys: ["win", "s"]
      - action: type_text
        text: "Xbox"
      - action: click
        target: "Xbox"
      - action: wait_for_element
        target: "Xbox 窗口"
        timeout: 10

  play_game:
    description: 玩游戏
    steps:
      - action: click
        target: "{game_name}"
      - action: click
        target: "播放"
    variables:
      - name: game_name
        description: 游戏名称
        type: string

uia_tree:
  main_window:
    class_name: "Windows.UI.Core.CoreWindow"
    children:
      - name: "游戏列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    game_list: [400, 300]
