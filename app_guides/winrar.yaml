metadata:
  name: WinRAR
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: WinRAR.exe
  install_paths:
    - "C:\\Program Files\\WinRAR"
  window_title_pattern: "* - WinRAR"
  class_name: "WinRARWindow"

login:
  required: false

features:
  - name: 压缩文件
    description: 压缩文件和文件夹
  - name: 解压文件
    description: 解压压缩包

operations:
  open:
    description: 打开 WinRAR
    steps:
      - action: click
        target: "桌面 WinRAR 图标"
      - action: wait_for_element
        target: "WinRAR 窗口"
        timeout: 10

  compress:
    description: 压缩文件
    steps:
      - action: select_files
        target: "{file_paths}"
      - action: hotkey
        keys: ["alt", "a"]
      - action: wait_for_element
        target: "压缩对话框"
      - action: type_text
        text: "{archive_name}"
      - action: press_key
        key: enter
    variables:
      - name: file_paths
        description: 文件路径列表
        type: array
      - name: archive_name
        description: 压缩包名称
        type: string

  extract:
    description: 解压文件
    steps:
      - action: open_file
        target: "{archive_path}"
      - action: hotkey
        keys: ["alt", "e"]
      - action: wait_for_element
        target: "解压对话框"
      - action: type_text
        text: "{extract_path}"
      - action: press_key
        key: enter
    variables:
      - name: archive_path
        description: 压缩包路径
        type: string
      - name: extract_path
        description: 解压路径
        type: string

uia_tree:
  main_window:
    class_name: "WinRARWindow"
    children:
      - name: "文件列表"
        type: "ListControl"
        path: [0, 0]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    file_list: [400, 300]
