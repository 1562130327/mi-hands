metadata:
  name: WPS Office
  version: "1.0.0"
  platform: windows
  last_updated: "2026-06-05"
  contributor: "mi-hands-team"
  verified: true

identity:
  process_name: wps.exe
  install_paths:
    - "C:\\Users\\Administrator\\AppData\\Local\\Kingsoft\\WPS Office"
  window_title_pattern: "* - WPS Office"
  class_name: "OpusApp"

login:
  required: false

features:
  - name: 文字处理
    description: 编辑文档
  - name: 表格处理
    description: 编辑表格
  - name: 演示文稿
    description: 编辑演示文稿

operations:
  open:
    description: 打开 WPS
    steps:
      - action: click
        target: "桌面 WPS 图标"
      - action: wait_for_element
        target: "WPS 窗口"
        timeout: 10

  new_document:
    description: 新建文档
    steps:
      - action: hotkey
        keys: ["ctrl", "n"]

  open_file:
    description: 打开文件
    steps:
      - action: hotkey
        keys: ["ctrl", "o"]
      - action: wait_for_element
        target: "文件选择对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

  save_file:
    description: 保存文件
    steps:
      - action: hotkey
        keys: ["ctrl", "s"]

  save_as:
    description: 另存为
    steps:
      - action: hotkey
        keys: ["ctrl", "shift", "s"]
      - action: wait_for_element
        target: "另存为对话框"
      - action: type_text
        text: "{file_path}"
      - action: press_key
        key: enter
    variables:
      - name: file_path
        description: 文件路径
        type: string

  type_text:
    description: 输入文本
    steps:
      - action: click
        target: "编辑区域"
      - action: type_text
        text: "{text}"
    variables:
      - name: text
        description: 文本内容
        type: string

uia_tree:
  main_window:
    class_name: "OpusApp"
    children:
      - name: "工具栏"
        type: "ToolBarControl"
        path: [0, 0]
      - name: "编辑区域"
        type: "EditControl"
        path: [0, 1]

fallback:
  when_uia_fails:
    - use_coordinates: true
  coordinate_hints:
    toolbar: [400, 30]
    editor: [400, 300]
